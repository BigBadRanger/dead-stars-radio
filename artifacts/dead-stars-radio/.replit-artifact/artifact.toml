kind = "web"
previewPath = "/"
title = "Dead Stars Radio"
version = "1.0.0"
id = "artifacts/dead-stars-radio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25739

[services.development]
run = "pnpm --filter @workspace/dead-stars-radio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dead-stars-radio", "run", "build" ]
publicDir = "artifacts/dead-stars-radio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25739"
BASE_PATH = "/"
